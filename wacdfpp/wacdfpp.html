<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CDFpp WASM Demo</title>
    <link rel="stylesheet" href="./uPlot.min.css">
    <style>
        :root {
            --bg: #0f1117;
            --surface: #1a1d27;
            --surface2: #242836;
            --border: #2e3345;
            --text: #e2e4eb;
            --text-dim: #8b8fa3;
            --accent: #6c8aff;
            --accent-dim: rgba(108, 138, 255, 0.12);
            --green: #4ade80;
            --yellow: #fbbf24;
            --red: #f87171;
            --mono: 'SF Mono', 'Cascadia Code', 'Fira Code', 'JetBrains Mono', Consolas, monospace;
            --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            --radius: 8px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--sans);
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
        }

        header {
            display: flex;
            align-items: baseline;
            gap: 0.75rem;
            margin-bottom: 2rem;
        }

        header h1 {
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: -0.02em;
        }

        header .badge {
            font-family: var(--mono);
            font-size: 0.7rem;
            padding: 0.2em 0.6em;
            background: var(--accent-dim);
            color: var(--accent);
            border-radius: 4px;
            font-weight: 500;
        }

        .input-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        @media (max-width: 640px) {
            .input-section { grid-template-columns: 1fr; }
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.25rem;
        }

        .card label {
            display: block;
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.75rem;
        }

        .card .row {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }

        input[type="file"] {
            font-family: var(--sans);
            font-size: 0.85rem;
            color: var(--text);
            min-width: 0;
            flex: 1;
        }

        input[type="file"]::file-selector-button {
            font-family: var(--sans);
            font-size: 0.8rem;
            font-weight: 500;
            padding: 0.4em 0.8em;
            background: var(--surface2);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.15s;
        }

        input[type="file"]::file-selector-button:hover {
            background: var(--border);
        }

        input[type="text"] {
            font-family: var(--mono);
            font-size: 0.85rem;
            flex: 1;
            min-width: 0;
            padding: 0.45em 0.7em;
            background: var(--bg);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 4px;
            outline: none;
            transition: border-color 0.15s;
        }

        input[type="text"]:focus {
            border-color: var(--accent);
        }

        input[type="text"]::placeholder {
            color: var(--text-dim);
            opacity: 0.6;
        }

        button {
            font-family: var(--sans);
            font-size: 0.8rem;
            font-weight: 500;
            padding: 0.45em 1em;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            white-space: nowrap;
            transition: opacity 0.15s;
        }

        button:hover:not(:disabled) { opacity: 0.85; }
        button:disabled { opacity: 0.35; cursor: not-allowed; }

        #status {
            font-family: var(--mono);
            font-size: 0.75rem;
            color: var(--text-dim);
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5em;
        }

        #status .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--text-dim);
            display: inline-block;
        }

        #status.ready .dot { background: var(--green); }
        #status.loading .dot { background: var(--yellow); animation: pulse 1s infinite; }
        #status.error .dot { background: var(--red); }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        #output-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.6rem 1rem;
            background: var(--surface2);
            border-bottom: 1px solid var(--border);
            font-size: 0.75rem;
            color: var(--text-dim);
        }

        #output-header span { font-family: var(--mono); }

        .log-key { color: var(--green); }
        .log-dim { color: var(--text-dim); }
        .log-val { color: var(--yellow); }
        .log-err { color: var(--red); }

        .app {
            display: grid;
            grid-template-columns: var(--sidebar-w, 320px) 6px 1fr;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .resizer { cursor: col-resize; background: var(--border); border-radius: 3px;
            transition: background 0.15s; touch-action: none; }
        .resizer:hover, .resizer.dragging { background: var(--accent); }
        @media (max-width: 720px) {
            .app { grid-template-columns: 1fr; }
            .resizer { display: none; }
        }

        .sidebar, .detail {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 0.75rem;
            max-height: 70vh;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--border) transparent;
        }

        #search {
            width: 100%;
            margin-bottom: 0.75rem;
            font-family: var(--mono);
            font-size: 0.8rem;
            padding: 0.45em 0.7em;
            background: var(--bg);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 4px;
            outline: none;
        }
        #search:focus { border-color: var(--accent); }

        .group { margin-bottom: 0.5rem; }
        .group-head { cursor: pointer; font-size: 0.75rem; color: var(--text-dim);
            text-transform: uppercase; letter-spacing: 0.05em; padding: 0.25rem 0; user-select: none; }
        .group-title { color: var(--text); }
        .group-body { font-family: var(--mono); font-size: 0.78rem; }

        .var-row { padding: 0.2rem 0.4rem; border-radius: 3px; cursor: pointer;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .var-row:hover { background: var(--surface2); }
        .var-row.sel { background: var(--accent-dim); border-left: 2px solid var(--accent); }

        /* Global-attr rows are content, not nav targets: wrap so the full value shows. */
        .attr-row { padding: 0.2rem 0.4rem; border-radius: 3px;
            white-space: normal; overflow-wrap: anywhere; }
        .attr-row:hover { background: var(--surface2); }

        .detail-title { font-family: var(--mono); font-size: 0.9rem; margin-bottom: 0.4rem; }
        .section-label { font-size: 0.72rem; color: var(--text-dim); text-transform: uppercase;
            letter-spacing: 0.05em; margin: 0.9rem 0 0.4rem; }
        .detail-attrs { font-family: var(--mono); font-size: 0.78rem; line-height: 1.6; }

        table.preview { width: 100%; border-collapse: collapse; font-family: var(--mono); font-size: 0.78rem; }
        table.preview td { padding: 0.15rem 0.5rem; border-bottom: 1px solid var(--border);
            vertical-align: top; word-break: break-all; }
        table.preview td:first-child { color: var(--text-dim); width: 3rem; text-align: right; }

        .plot-panel { margin: 0.4rem 0 0.6rem; }
        .plot-controls { display: flex; flex-wrap: wrap; gap: 0.35rem; margin-bottom: 0.5rem; }
        .plot-btn { font-family: var(--mono); font-size: 0.72rem; padding: 0.25em 0.7em;
            background: var(--surface2); color: var(--text); border: 1px solid var(--border);
            border-radius: 4px; cursor: pointer; }
        .plot-btn:hover:not(:disabled) { opacity: 1; background: var(--border); }
        .plot-btn.active { background: var(--accent-dim); color: var(--accent); border-color: var(--accent); }
        .plot-body { min-height: 60px; }
        canvas.spectro { width: 100%; height: 320px; image-rendering: pixelated;
            border: 1px solid var(--border); border-radius: var(--radius); background: var(--bg); }
        .plot-note { padding: 1.25rem; text-align: center; color: var(--text-dim);
            border: 1px dashed var(--border); border-radius: var(--radius); }
        .uplot, .u-wrap { width: 100% !important; }

        .dropzone { position: fixed; inset: 0; display: none; align-items: center; justify-content: center;
            background: rgba(15,17,23,0.85); color: var(--accent); font-size: 1.2rem; z-index: 10;
            border: 3px dashed var(--accent); }
        .dropzone.active { display: flex; }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1>CDFpp WASM Demo</h1>
        <span class="badge">WebAssembly</span>
    </header>

    <div class="input-section">
        <div class="card">
            <label>Load local file</label>
            <div class="row">
                <input type="file" id="fileInput" accept=".cdf">
                <button id="loadBtn" disabled>Inspect</button>
            </div>
        </div>
        <div class="card">
            <label>Fetch from URL</label>
            <div class="row">
                <input type="text" id="urlInput" placeholder="https://example.com/data.cdf">
                <button id="fetchBtn" disabled>Fetch</button>
            </div>
        </div>
    </div>

    <div id="status" class="loading">
        <span class="dot"></span>
        <span id="statusText">Initializing WASM module...</span>
    </div>

    <div id="output-header">
        <span id="fileName">No file loaded</span>
        <span id="parseTime"></span>
    </div>

    <div class="app">
        <aside class="sidebar">
            <input type="text" id="search" placeholder="Search variables & attributes…">
            <div id="varlist"></div>
        </aside>
        <div class="resizer" id="resizer" title="Drag to resize"></div>
        <section class="detail">
            <div id="detail-body"><div class="log-dim">Load a CDF to begin.</div></div>
        </section>
    </div>
</div>
<div id="dropzone" class="dropzone"><span>Drop a .cdf file</span></div>
<script type="module" src="./app.js"></script>
</body>
</html>
