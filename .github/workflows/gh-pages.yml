name: Deploy WASM demo to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'wacdfpp/**'
      - 'include/**'
      - 'meson.build'
      - '.github/workflows/gh-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: mymindstorm/setup-emsdk@v14
        with:
          version: 4.0.9

      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install meson and ninja
        run: pip install meson ninja

      - name: Configure
        run: >
          meson setup build_wasm
          --cross-file wacdfpp/wasm.txt
          -Ddisable_python_wrapper=true
          -Dwith_experimental_wasm=true

      - name: Build
        run: ninja -C build_wasm

      - name: Prepare pages
        run: |
          mkdir -p _site
          cp build_wasm/wacdfpp/cdfpp.js _site/
          cp build_wasm/wacdfpp/cdfpp.wasm _site/
          cp build_wasm/wacdfpp/wacdfpp.html _site/index.html

      - uses: actions/upload-pages-artifact@v3

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
