name: Deploy WASM demo to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'wacdfpp/**'
      - 'include/**'
      - 'meson.build'
      - '.github/workflows/gh-pages.yml'
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: mymindstorm/setup-emsdk@v16
        with:
          version: 4.0.9

      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install meson and ninja
        run: pip install meson ninja

      - name: Configure
        run: >
          meson setup build_wasm
          --cross-file wacdfpp/wasm.txt
          -Ddisable_python_wrapper=true
          -Dwith_experimental_wasm=true

      - name: Build
        run: ninja -C build_wasm

      - name: Prepare pages
        run: |
          mkdir -p _site
          # cdfpp.js/.wasm + the ES modules (app/cdf-model/render/plot-model/spectrogram/
          # plot/astralint) + vendored uPlot (.js/.css)
          cp build_wasm/wacdfpp/*.js build_wasm/wacdfpp/*.wasm build_wasm/wacdfpp/*.css _site/
          cp build_wasm/wacdfpp/wacdfpp.html _site/index.html

      - uses: actions/upload-pages-artifact@v5

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
