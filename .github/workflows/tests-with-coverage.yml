name: Tests Linux with coverage

on:
  push:
  pull_request:

jobs:
  build:
    name: build an tests with coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y lcov g++ catch2
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - name: Install Python dependencies
        run: python3.13 -m pip install meson ninja numpy meson-python>=0.14.0 build wheel ddt requests
      - name: Configure with meson
        run: meson -Db_coverage=true -Dwith_tests=true -Dwith_experimental_zstd=true . build
      - name: Build (meson)
        run: ninja -C build
      - name: Run tests (meson)
        run: ninja test -C build
      - name: Generate Coverage report
        run: |
          lcov --capture --ignore-errors=inconsistent,mismatch --directory . --output-file coverage.info
          lcov --remove coverage.info '/usr/*' --ignore-errors=unused --output-file coverage.info
          lcov --remove coverage.info '*/catch*' --ignore-errors=unused --output-file coverage.info
          lcov --list coverage.info
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: ./coverage.info
          flags: unittests
          name: codecov-cdfpp
          yml: ./codecov.yml
          fail_ci_if_error: true
